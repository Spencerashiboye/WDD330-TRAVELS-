<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
  <title id="title">Travel inspiration hero illustration</title>
  <desc id="desc">A colorful travel collage with airplanes, passport stamps, ocean, mountains, and destination cards.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff6ff"/>
      <stop offset="45%" stop-color="#ffd6b3"/>
      <stop offset="100%" stop-color="#f7efe7"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6cd1ea"/>
      <stop offset="100%" stop-color="#2f7fb0"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb17a"/>
      <stop offset="100%" stop-color="#ff7f50"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93dddf"/>
      <stop offset="100%" stop-color="#4d9fc5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#1f2a37" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="900" height="680" rx="40" fill="url(#sky)"/>
  <circle cx="716" cy="108" r="68" fill="#fff4bf" opacity="0.92"/>
  <path d="M0 468 C144 422 270 454 394 434 S650 392 900 452 L900 680 L0 680 Z" fill="url(#sea)"/>
  <path d="M0 404 L124 340 L230 380 L368 286 L500 382 L636 260 L786 352 L900 306 L900 680 L0 680 Z" fill="#7eb0bb" opacity="0.5"/>
  <path d="M0 448 L132 384 L244 430 L388 338 L528 432 L668 302 L814 388 L900 352 L900 680 L0 680 Z" fill="#4b7e87" opacity="0.78"/>
  <g filter="url(#shadow)">
    <rect x="112" y="104" width="310" height="196" rx="28" fill="#ffffff" opacity="0.96"/>
    <rect x="140" y="136" width="254" height="110" rx="20" fill="url(#card1)"/>
    <path d="M140 212 C188 174 244 190 284 164 C322 142 352 166 394 138 L394 246 L140 246 Z" fill="#8c5134" opacity="0.4"/>
    <text x="164" y="176" fill="#fff9f2" font-size="20" font-family="Montserrat, Arial, sans-serif" font-weight="700" letter-spacing="2">AFRICA SPOTLIGHT</text>
    <text x="164" y="214" fill="#ffffff" font-size="42" font-family="Montserrat, Arial, sans-serif" font-weight="800">Accra</text>
    <text x="164" y="250" fill="#fff4ea" font-size="22" font-family="Open Sans, Arial, sans-serif" font-weight="700">Ghana</text>
    <circle cx="167" cy="272" r="6" fill="#ff7f50"/>
    <text x="184" y="278" fill="#5b6573" font-size="18" font-family="Open Sans, Arial, sans-serif">Coast, culture, food</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="458" y="178" width="286" height="176" rx="28" fill="#ffffff" opacity="0.97" transform="rotate(-6 601 266)"/>
    <g transform="rotate(-6 601 266)">
      <rect x="486" y="210" width="230" height="92" rx="18" fill="url(#card2)"/>
      <path d="M486 282 C526 232 568 246 610 214 C648 186 684 214 716 194 L716 302 L486 302 Z" fill="#194968" opacity="0.36"/>
      <text x="508" y="246" fill="#effbfd" font-size="18" font-family="Montserrat, Arial, sans-serif" font-weight="700" letter-spacing="2">FEATURED ESCAPE</text>
      <text x="508" y="282" fill="#ffffff" font-size="36" font-family="Montserrat, Arial, sans-serif" font-weight="800">Cape Town</text>
      <text x="508" y="314" fill="#eefbfd" font-size="20" font-family="Open Sans, Arial, sans-serif" font-weight="700">South Africa</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="232" y="382" width="420" height="168" rx="30" fill="#ffffff" opacity="0.96"/>
    <path d="M262 470 C334 408 406 434 476 390 C550 346 612 380 622 382 L622 520 L262 520 Z" fill="#efede7"/>
    <path d="M262 500 C324 458 390 486 460 444 C530 402 586 434 652 392 L652 520 L262 520 Z" fill="#7ba0bc" opacity="0.82"/>
    <path d="M254 414 C370 402 466 436 574 418" stroke="#ff7f50" stroke-width="8" stroke-linecap="round" fill="none"/>
    <text x="286" y="438" fill="#1f2a37" font-size="22" font-family="Montserrat, Arial, sans-serif" font-weight="800">Explore the next route</text>
    <text x="286" y="472" fill="#546173" font-size="18" font-family="Open Sans, Arial, sans-serif">Visual destination cards, favorites, and route planning in one place.</text>
    <g fill="#ffffff" opacity="0.92">
      <rect x="286" y="498" width="110" height="30" rx="15"/>
      <rect x="408" y="498" width="122" height="30" rx="15"/>
      <rect x="542" y="498" width="84" height="30" rx="15"/>
    </g>
  </g>
  <g transform="translate(676 72) rotate(14)">
    <path d="M0 54 L70 36 L144 0 L152 20 L88 58 L152 74 L146 94 L76 80 L30 120 L8 116 L36 74 L0 64 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M0 54 L70 36 L144 0" stroke="#4d9fc5" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>